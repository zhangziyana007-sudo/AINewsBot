# aibot.zizaya.top — 前端静态文件
server {
    listen 80;
    server_name aibot.zizaya.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aibot.zizaya.top;

    ssl_certificate /etc/letsencrypt/live/aibot.zizaya.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aibot.zizaya.top/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /opt/aibot/web;
    index index.html;

    # 静态文件缓存
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
