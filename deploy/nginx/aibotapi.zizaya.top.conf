# aibotapi.zizaya.top — 后端 API 反向代理
server {
    listen 80;
    server_name aibotapi.zizaya.top;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS 重定向
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aibotapi.zizaya.top;

    ssl_certificate /etc/letsencrypt/live/aibotapi.zizaya.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aibotapi.zizaya.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # CORS 预检请求
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Auth-Token" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # 代理到后端 Node.js 服务
    location / {
        proxy_pass http://127.0.0.1:3457;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 生成任务可能需要较长时间
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 生成的图片静态文件
    location /output/ {
        proxy_pass http://127.0.0.1:3457/output/;
        proxy_cache_valid 200 1h;
    }
}
