<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="styles.css">
  <title>AI 日报 - {{SECTION_TITLE}}</title>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <!-- 顶部报头（简化版） -->
      <div class="header">
        <div class="brand">
          <div class="brand-icon">AI</div>
          <span class="brand-title">AI 日报</span>
        </div>
        <div class="date-badge">{{DATE_SHORT}}</div>
      </div>

      <div class="divider-double"></div>

      <!-- 版块标题 — 棕色底色栏目头 -->
      <div class="section-header">
        <div class="section-emoji">{{SECTION_EMOJI}}</div>
        <span class="section-title">{{SECTION_TITLE}}</span>
        <span class="section-count">{{SECTION_COUNT}} 条</span>
      </div>

      <!-- 新闻列表 -->
      <div class="news-list">
        {{NEWS_ITEMS}}
      </div>

      <!-- 页码 -->
      <div class="page-indicator">— {{PAGE_NUM}} / {{TOTAL_PAGES}} —</div>
    </div>
  </div>
</body>
</html>
