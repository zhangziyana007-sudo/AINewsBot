<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 日报控制台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 主界面 ====== -->
  <div id="main-view" class="view">
    <!-- 顶部导航 -->
    <nav class="topbar">
      <div class="topbar-left">
        <span class="app-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg></span>
        <span class="app-name">AI 日报</span>
      </div>
      <div class="topbar-right">
      </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
      <!-- 左侧面板：控制 -->
      <aside class="sidebar mac-window">
        <div class="mac-titlebar">
          <div class="traffic-lights">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <span class="titlebar-text">生成控制</span>
        </div>
        <div class="sidebar-body">
          <!-- 日期选择 -->
          <div class="control-group">
            <label>日期</label>
            <input type="date" id="input-date" class="mac-input">
          </div>

          <!-- 模型选择 -->
          <div class="control-group">
            <label>AI 模型 <button class="btn-link" id="btn-model-config" title="配置模型"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button></label>
            <select id="input-model" class="mac-input"></select>
          </div>

          <!-- 模板样式 -->
          <div class="control-group">
            <label>日报样式 <button class="btn-link" id="btn-template-text" title="编辑模板文字"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg></button></label>
            <div id="template-list" class="template-list"></div>
          </div>

          <!-- 生成按钮 -->
          <button class="btn-generate" id="btn-generate">
            <span class="btn-text">生成日报</span>
            <span class="btn-spinner" hidden></span>
          </button>

          <!-- 进度 -->
          <div id="progress-area" class="progress-area" hidden>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>
          </div>

          <!-- 分割线 -->
          <hr class="divider">

          <!-- 服务器连接 -->
          <div class="control-group">
            <label>后端服务器 <span class="server-status" id="server-status">●</span></label>
            <div class="server-url-row">
              <input type="text" id="input-server-url" class="mac-input" placeholder="http://your-vps:3457">
              <button class="btn-icon btn-small" id="btn-server-test" title="测试连接"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
            </div>
          </div>

          <!-- 定时任务 -->
          <div class="control-group">
            <label>定时生成</label>
            <div class="schedule-row">
              <label class="switch">
                <input type="checkbox" id="schedule-enabled">
                <span class="slider"></span>
              </label>
              <select id="schedule-preset" class="mac-input mac-input-sm">
                <option value="0 7 * * *">每天 07:00</option>
                <option value="0 8 * * *" selected>每天 08:00</option>
                <option value="0 9 * * *">每天 09:00</option>
                <option value="0 10 * * *">每天 10:00</option>
                <option value="0 12 * * *">每天 12:00</option>
                <option value="0 20 * * *">每天 20:00</option>
              </select>
            </div>
            <div class="schedule-row" style="margin-top: 8px;">
              <label class="switch">
                <input type="checkbox" id="schedule-auto-draft">
                <span class="slider"></span>
              </label>
              <span style="font-size: 13px; color: var(--text-secondary);">生成后自动存草稿到小红书</span>
            </div>
            <p class="schedule-info" id="schedule-info"></p>
          </div>

          <hr class="divider">

          <!-- 小红书发布 -->
          <div class="control-group">
            <label>小红书发布 <span class="xhs-status" id="xhs-status">●</span></label>
            <div class="xhs-actions">
              <button class="btn-small btn-outline" id="btn-xhs-login">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                扫码登录
              </button>
              <button class="btn-small btn-primary" id="btn-xhs-draft" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
                存草稿
              </button>
            </div>
            <p class="xhs-info" id="xhs-info"></p>
          </div>

          <hr class="divider">

          <!-- 历史记录 -->
          <div class="history-section">
            <div class="history-header">
              <h3>历史日报</h3>
              <button class="btn-clear-all" id="btn-clear-history" title="清空全部历史"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
            </div>
            <div id="history-list" class="history-list">
              <p class="muted">加载中...</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- 右侧面板：预览 -->
      <main class="preview-panel mac-window">
        <div class="mac-titlebar">
          <div class="traffic-lights">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <span class="titlebar-text" id="preview-title">图片预览</span>
        </div>
        <div class="preview-body" id="preview-body">
          <div class="empty-state">
            <div class="empty-icon"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 18v-4"/><path d="M14 18v-6"/></svg></div>
            <p>选择日期并生成日报</p>
            <p class="muted">或从左侧历史记录中选择查看</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 全局弹窗（必须在 main-content 外，避免 overflow:hidden 截断） -->

  <!-- 模型配置弹窗 -->
  <div id="model-modal" class="modal-overlay" hidden>
    <div class="modal mac-window">
      <div class="mac-titlebar">
        <div class="traffic-lights">
          <span class="dot red" id="modal-close"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="titlebar-text">模型配置</span>
      </div>
      <div class="modal-body" id="model-config-body"></div>
      <div class="modal-footer">
        <button class="btn-add-model" id="btn-add-model">＋ 添加自定义模型</button>
      </div>
    </div>
  </div>

  <!-- 模板文字编辑弹窗 -->
  <div id="text-modal" class="modal-overlay" hidden>
    <div class="modal mac-window" style="max-width: 580px;">
      <div class="mac-titlebar">
        <div class="traffic-lights">
          <span class="dot red" id="text-modal-close"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="titlebar-text">模板文字编辑</span>
      </div>
      <div class="modal-body" id="text-config-body" style="max-height: 60vh; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- 小红书登录弹窗 -->
  <div id="xhs-modal" class="modal-overlay" hidden>
    <div class="modal mac-window" style="max-width: 480px;">
      <div class="mac-titlebar">
        <div class="traffic-lights">
          <span class="dot red" id="xhs-modal-close"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="titlebar-text">小红书登录</span>
      </div>
      <div class="modal-body" style="padding: 0;">
        <!-- 登录方式 Tab -->
        <div style="display: flex; border-bottom: 1px solid var(--border-color);">
          <button class="xhs-tab active" data-tab="cookie" style="flex:1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-secondary); border-bottom: 2px solid transparent;">Cookie 导入</button>
          <button class="xhs-tab" data-tab="qr" style="flex:1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-secondary); border-bottom: 2px solid transparent;">扫码登录</button>
          <button class="xhs-tab" data-tab="sms" style="flex:1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-secondary); border-bottom: 2px solid transparent;">短信登录</button>
        </div>

        <!-- Cookie 导入面板（推荐，默认显示） -->
        <div id="xhs-cookie-panel" style="padding: 24px; text-align: center;">
          <p style="margin-bottom: 12px; color: var(--text-secondary); font-size: 13px; text-align: left; line-height: 1.6;">
            推荐方式：从 Chrome 浏览器导出 Cookie 后粘贴到下方。<br>
            <span style="color: var(--text-tertiary);">提示：安装 <a href="https://chromewebstore.google.com/detail/editthiscookie/fngmhnnpilhplaeedifhccceomclgfbg" target="_blank" rel="noopener" style="color: var(--accent);">EditThisCookie</a> 或 <a href="https://chromewebstore.google.com/detail/cookie-editor/hlkenndednhfkekhgcdicdfddnkalmdm" target="_blank" rel="noopener" style="color: var(--accent);">Cookie-Editor</a> 扩展，登录小红书创作者中心后导出 JSON</span>
          </p>
          <textarea id="xhs-cookie-input" placeholder='粘贴 Cookie JSON（数组格式，如 [{"name":"...", "value":"...", "domain":"..."}]）' style="width: 100%; height: 140px; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; font-family: monospace; background: var(--bg-card); color: var(--text-primary); box-sizing: border-box; resize: vertical;"></textarea>
          <p id="xhs-cookie-msg" style="margin-top: 8px; min-height: 20px; font-size: 13px; color: var(--text-secondary);"></p>
          <button class="btn-small btn-primary" id="btn-xhs-import-cookie" style="width: 100%; padding: 12px; font-size: 15px; margin-top: 8px;">导入 Cookie</button>
        </div>

        <!-- 短信登录面板 -->
        <div id="xhs-sms-panel" style="padding: 24px; text-align: center; display: none;">
          <p id="xhs-sms-msg" style="margin-bottom: 16px; color: var(--text-secondary); min-height: 20px;"></p>
          <div style="margin-bottom: 12px;">
            <input id="xhs-phone" type="tel" maxlength="11" placeholder="请输入手机号" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: var(--bg-card); color: var(--text-primary); box-sizing: border-box;">
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <input id="xhs-code" type="text" maxlength="6" placeholder="验证码" style="flex: 1; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: var(--bg-card); color: var(--text-primary);">
            <button class="btn-small" id="btn-xhs-send-code" style="white-space: nowrap; padding: 10px 16px;">发送验证码</button>
          </div>
          <button class="btn-small btn-primary" id="btn-xhs-sms-login" style="width: 100%; padding: 12px; font-size: 15px;" disabled>登 录</button>
        </div>

        <!-- 扫码登录面板 -->
        <div id="xhs-qr-panel" style="padding: 24px; text-align: center; display: none;">
          <p id="xhs-login-msg" style="margin-bottom: 16px; color: var(--text-secondary);">点击下方按钮加载二维码</p>
          <img id="xhs-qr-img" style="max-width: 360px; border-radius: 8px; border: 1px solid var(--border-color);" alt="小红书登录二维码">
          <div style="margin-top: 16px; display: flex; gap: 8px; justify-content: center;">
            <button class="btn-small" id="btn-xhs-load-qr">加载二维码</button>
            <button class="btn-small btn-outline" id="btn-xhs-check">检查登录状态</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
