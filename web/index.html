<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 日报控制台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 登录页 ====== -->
  <div id="login-view" class="view">
    <div class="login-card mac-window">
      <div class="mac-titlebar">
        <div class="traffic-lights">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="titlebar-text">AI 日报控制台</span>
      </div>
      <div class="login-body">
        <div class="login-icon">🤖</div>
        <h2>AI 日报</h2>
        <p class="login-subtitle">输入密码以继续</p>
        <form id="login-form">
          <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" autofocus>
          <button type="submit" class="btn-primary">登录</button>
        </form>
        <p id="login-error" class="error-text" hidden></p>
      </div>
    </div>
  </div>

  <!-- ====== 主界面 ====== -->
  <div id="main-view" class="view" hidden>
    <!-- 顶部导航 -->
    <nav class="topbar">
      <div class="topbar-left">
        <span class="app-icon">🤖</span>
        <span class="app-name">AI 日报</span>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" id="btn-logout" title="退出登录">⏻</button>
      </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
      <!-- 左侧面板：控制 -->
      <aside class="sidebar mac-window">
        <div class="mac-titlebar">
          <div class="traffic-lights">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <span class="titlebar-text">生成控制</span>
        </div>
        <div class="sidebar-body">
          <!-- 日期选择 -->
          <div class="control-group">
            <label>日期</label>
            <input type="date" id="input-date" class="mac-input">
          </div>

          <!-- 模型选择 -->
          <div class="control-group">
            <label>AI 模型 <button class="btn-link" id="btn-model-config" title="配置模型">⚙️</button></label>
            <select id="input-model" class="mac-input"></select>
          </div>

          <!-- 模板样式 -->
          <div class="control-group">
            <label>日报样式 <button class="btn-link" id="btn-template-text" title="编辑模板文字">✏️</button></label>
            <div id="template-list" class="template-list"></div>
          </div>

          <!-- 生成按钮 -->
          <button class="btn-generate" id="btn-generate">
            <span class="btn-text">生成日报</span>
            <span class="btn-spinner" hidden></span>
          </button>

          <!-- 进度 -->
          <div id="progress-area" class="progress-area" hidden>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>
          </div>

          <!-- 分割线 -->
          <hr class="divider">

          <!-- 服务器连接 -->
          <div class="control-group">
            <label>后端服务器 <span class="server-status" id="server-status">●</span></label>
            <div class="server-url-row">
              <input type="text" id="input-server-url" class="mac-input" placeholder="http://your-vps:3457">
              <button class="btn-icon btn-small" id="btn-server-test" title="测试连接">🔗</button>
            </div>
          </div>

          <!-- 定时任务 -->
          <div class="control-group">
            <label>定时生成</label>
            <div class="schedule-row">
              <label class="switch">
                <input type="checkbox" id="schedule-enabled">
                <span class="slider"></span>
              </label>
              <select id="schedule-preset" class="mac-input mac-input-sm">
                <option value="0 7 * * *">每天 07:00</option>
                <option value="0 8 * * *" selected>每天 08:00</option>
                <option value="0 9 * * *">每天 09:00</option>
                <option value="0 10 * * *">每天 10:00</option>
                <option value="0 12 * * *">每天 12:00</option>
                <option value="0 20 * * *">每天 20:00</option>
              </select>
            </div>
            <p class="schedule-info" id="schedule-info"></p>
          </div>

          <hr class="divider">

          <!-- 历史记录 -->
          <div class="history-section">
            <div class="history-header">
              <h3>历史日报</h3>
              <button class="btn-clear-all" id="btn-clear-history" title="清空全部历史">🗑️</button>
            </div>
            <div id="history-list" class="history-list">
              <p class="muted">加载中...</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- 右侧面板：预览 -->
      <main class="preview-panel mac-window">
        <div class="mac-titlebar">
          <div class="traffic-lights">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <span class="titlebar-text" id="preview-title">图片预览</span>
        </div>
        <div class="preview-body" id="preview-body">
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <p>选择日期并生成日报</p>
            <p class="muted">或从左侧历史记录中选择查看</p>
          </div>
        </div>
      </main>

      <!-- 模型配置弹窗 -->
      <div id="model-modal" class="modal-overlay" hidden>
        <div class="modal mac-window">
          <div class="mac-titlebar">
            <div class="traffic-lights">
              <span class="dot red" id="modal-close"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <span class="titlebar-text">模型配置</span>
          </div>
          <div class="modal-body" id="model-config-body"></div>
          <div class="modal-footer">
            <button class="btn-add-model" id="btn-add-model">＋ 添加自定义模型</button>
          </div>
        </div>
      </div>

      <!-- 模板文字编辑弹窗 -->
      <div id="text-modal" class="modal-overlay" hidden>
        <div class="modal mac-window" style="max-width: 580px;">
          <div class="mac-titlebar">
            <div class="traffic-lights">
              <span class="dot red" id="text-modal-close"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <span class="titlebar-text">模板文字编辑</span>
          </div>
          <div class="modal-body" id="text-config-body" style="max-height: 60vh; overflow-y: auto;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
