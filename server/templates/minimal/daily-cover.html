<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="styles.css">
  <title>AI Daily - Cover</title>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <!-- 顶部渐变条 -->
      <div class="top-bar"></div>

      <!-- 头部 -->
      <div class="header">
        <div class="header-brand">
          <div class="header-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2 7.586 7.586a2 2 0 0 1 0 2.828L13 20"/><path d="m11 2-7.586 7.586a2 2 0 0 0 0 2.828L11 20"/></svg></div>
          <div class="header-title">{{TEXT_TITLEBAR}}</div>
        </div>
        <div class="header-date">{{DATE_FULL}} {{WEEKDAY}}</div>
      </div>

      <!-- 内容区 -->
      <div class="content-area">
        <!-- 大标题 -->
        <div class="cover-hero">
          <div class="cover-hero-label">{{TEXT_LABEL}}</div>
          <div class="cover-hero-title">
            {{MAIN_TITLE_HTML}}
          </div>
          <div class="cover-hero-sub">"{{DAILY_QUOTE}}"</div>
        </div>

        <div class="divider"></div>

        <!-- 新闻列表 -->
        <div class="list-header">
          <span class="list-header-text">{{TEXT_LIST_TITLE}}</span>
          <span class="list-header-count">共 {{TOTAL_COUNT}} 条</span>
        </div>
        <ul class="cover-news-list">
          {{NEWS_LIST_HTML}}
        </ul>

        <!-- 底部提示 -->
        <div class="footer-hint">{{TEXT_BOTTOM_HINT}}</div>
      </div>

      <!-- 底栏 -->
      <div class="footer">
        <span class="footer-left">{{TEXT_STATUS_LEFT}}</span>
        <span class="footer-right">{{TEXT_STATUS_RIGHT}}</span>
      </div>
    </div>
  </div>
  <script>
  (function(){
    var list = document.querySelector('.cover-news-list');
    var items = list ? list.querySelectorAll('.cover-news-item') : [];
    if (!items.length) return;
    var card = document.querySelector('.card');
    var cardH = card.offsetHeight;
    var listTop = list.getBoundingClientRect().top - card.getBoundingClientRect().top;
    var hint = document.querySelector('.footer-hint');
    var foot = document.querySelector('.footer');
    var bottomUsed = (hint ? hint.offsetHeight : 0) + (foot ? foot.offsetHeight : 0) + 16;
    var available = cardH - listTop - bottomUsed;
    if (available < 100) return;
    var perItem = available / items.length;
    var fontSize, padding, lineHeight;
    if (perItem >= 65) {
      fontSize = 28; padding = 14; lineHeight = 1.5;
    } else if (perItem >= 50) {
      fontSize = 26; padding = 10; lineHeight = 1.45;
    } else if (perItem >= 40) {
      fontSize = 23; padding = 7; lineHeight = 1.35;
    } else {
      fontSize = 20; padding = 4; lineHeight = 1.3;
    }
    for (var i = 0; i < items.length; i++) {
      items[i].style.fontSize = fontSize + 'px';
      items[i].style.lineHeight = lineHeight;
      items[i].style.padding = padding + 'px 0';
    }
    var idxs = list.querySelectorAll('.cover-news-idx');
    var idxSize = Math.max(fontSize - 4, 16);
    var circleSize = Math.max(fontSize + 8, 32);
    for (var j = 0; j < idxs.length; j++) {
      idxs[j].style.fontSize = idxSize + 'px';
      idxs[j].style.width = circleSize + 'px';
      idxs[j].style.height = circleSize + 'px';
    }
  })();
  </script>
</body>
</html>
